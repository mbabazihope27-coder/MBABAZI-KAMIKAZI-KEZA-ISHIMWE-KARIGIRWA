<!DOCTYPE html>
<html>
<head>
    <title>Course Registration Form</title>

    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .box{
            width: 350px;
            background: white;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
        }

        h2{
            text-align: center;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: purple;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Course Registration</h2>

    <form>
        <input type="text" placeholder="Enter Name" required>

        <input type="email" placeholder="Enter Email" required>

        <select required>
            <option value="">Select Course</option>
            <option>Web Development</option>
            <option>Java Programming</option>
            <option>Networking</option>
            <option>Database</option>
        </select>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
