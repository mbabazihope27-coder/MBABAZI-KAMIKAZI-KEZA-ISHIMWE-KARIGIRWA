<!DOCTYPE html>
<html>
<head>
    <title>Entertainment Form</title>
    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .form-box{
            width: 350px;
            background: white;
            padding: 20px;
            margin: 50px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2{
            text-align: center;
            color: darkblue;
        }

        input, select, textarea{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover{
            background-color: blue;
        }
    </style>
</head>

<body>

<div class="form-box">

    <h2>Entertainment Form</h2>

    <form>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <label>Favorite Entertainment</label>
        <select>
            <option>Music</option>
            <option>Movies</option>
            <option>Games</option>
            <option>Sports</option>
        </select>

        <label>Favorite Artist/Movie/Game</label>
        <input type="text" placeholder="Type here">

        <label>Comments</label>
        <textarea rows="4" placeholder="Write something..."></textarea>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
